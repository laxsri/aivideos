name: Daily Telegram Curator

on:
  schedule:
    # 7:00 AM IST = 1:30 AM UTC (IST is UTC+5:30)
    - cron: '30 1 * * *'
  workflow_dispatch:  # allows manual triggering from the Actions tab

permissions:
  contents: write  # needed so the job can commit seen_videos.json back

jobs:
  curate-and-send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run curator
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit updated seen_videos.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain seen_videos.json)" ]; then
            git add seen_videos.json
            git commit -m "Update seen_videos.json [skip ci]"
            git push
          else
            echo "No changes to seen_videos.json"
          fi
